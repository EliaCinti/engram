name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # install base (senza fastembed): la suite gira in modalità keyword,
      # il test che richiede embeddings si auto-skippa. Il modello semantico
      # (~200MB) non va scaricato a ogni run di CI.
      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q
